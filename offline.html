<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#6C63FF">
<title>Offline — KalkulatorOnline</title>
<link rel="stylesheet" href="/app.css">
<style>
  body{display:grid;place-items:center;min-height:100dvh;text-align:center;margin:0;padding:24px}
  .o{max-width:440px}
  .o .ic{width:72px;height:72px;border-radius:20px;background:var(--grad-brand);display:grid;place-items:center;margin:0 auto 18px;box-shadow:var(--sh-float)}
  .o .ic svg{width:36px;height:36px;color:#fff}
  .o h1{font-size:26px;margin:0 0 10px}
  .o p{color:var(--text-2);line-height:1.7;margin:0 0 20px}
  .o a{display:inline-flex;align-items:center;gap:8px;padding:13px 24px;border-radius:999px;background:var(--grad-brand);color:#fff;font-weight:700;text-decoration:none;box-shadow:var(--sh-float)}
  .o a svg{width:18px;height:18px}
</style>
</head>
<body>
  <div class="o">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg></div>
    <h1 class="grad-text">Anda sedang offline</h1>
    <p>Tenang — kalkulator yang pernah Anda buka tetap bisa dipakai dari cache. Sambungkan internet untuk memuat halaman baru.</p>
    <a href="/"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Coba lagi</a>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>if(window.lucide)lucide.createIcons();</script>
</body>
</html>
